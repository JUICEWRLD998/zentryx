services:
  - type: web
    name: zentryx-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: worker
    name: zentryx-worker
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
        
